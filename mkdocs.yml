site_name: MHRQI
site_description: Multi-scale Hierarchical Representation of Quantum Images
site_author: Keno S. Jose
repo_url: https://github.com/Keno-00/MHRQI
site_url: https://keno-00.github.io/MHRQI/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            group_by_category: true

nav:
  - Home: index.md
  - Getting Started:
      - User Guide: guide.md
      - Installation: guide.md#installation
      - Quick Start: guide.md#quick-start
  - Examples & Interactive:
      - Interactive Notebooks: examples.md
      - Monte Carlo Simulations: examples.md#monte-carlo-simulations
      - Medical Image Denoising: examples.md#medical-image-denoising-pipeline
      - Run on MyBinder: https://mybinder.org/v2/gh/Keno-00/MHRQI/main?urlpath=lab
  - API Reference:
      - Core (Representation): api/core.md
      - Denoising: api/denoising.md
      - Simulation & Monte Carlo: api/simulation.md
      - Utils: api/utils.md
      - Benchmarks: api/benchmarks.md
  - Performance:
      - Benchmark Results: benchmarks.md
      - Convergence Analysis: benchmarks.md#monte-carlo-convergence
      - Medical Metrics: benchmarks.md#medical-imaging-evaluation
  - Contributing: contributing.md
